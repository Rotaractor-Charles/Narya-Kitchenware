<svg viewBox="0 0 400 400" xmlns="http://www.w3.org/2000/svg">
  <rect width="400" height="400" fill="#E8EDE0"/>
  <!-- Shadow -->
  <ellipse cx="205" cy="352" rx="155" ry="12" fill="rgba(28,46,28,0.11)"/>
  <!-- Board body -->
  <rect x="48" y="115" width="305" height="222" rx="12" fill="#C8874A"/>
  <!-- Wood grain lines -->
  <rect x="48" y="115" width="305" height="222" rx="12" fill="url(#grain)"/>
  <defs>
    <pattern id="grain" x="0" y="0" width="305" height="222" patternUnits="userSpaceOnUse">
      <rect width="305" height="222" fill="#C8874A"/>
      <line x1="0" y1="18"  x2="305" y2="18"  stroke="rgba(160,90,20,0.25)" stroke-width="1.5"/>
      <line x1="0" y1="42"  x2="305" y2="42"  stroke="rgba(200,120,50,0.2)" stroke-width="2"/>
      <line x1="0" y1="60"  x2="305" y2="60"  stroke="rgba(160,90,20,0.18)" stroke-width="1"/>
      <line x1="0" y1="82"  x2="305" y2="82"  stroke="rgba(200,120,50,0.22)" stroke-width="2"/>
      <line x1="0" y1="102" x2="305" y2="102" stroke="rgba(160,90,20,0.15)" stroke-width="1.5"/>
      <line x1="0" y1="126" x2="305" y2="126" stroke="rgba(200,120,50,0.2)" stroke-width="1"/>
      <line x1="0" y1="148" x2="305" y2="148" stroke="rgba(160,90,20,0.25)" stroke-width="2"/>
      <line x1="0" y1="168" x2="305" y2="168" stroke="rgba(200,120,50,0.18)" stroke-width="1.5"/>
      <line x1="0" y1="190" x2="305" y2="190" stroke="rgba(160,90,20,0.2)" stroke-width="1"/>
      <line x1="0" y1="210" x2="305" y2="210" stroke="rgba(200,120,50,0.22)" stroke-width="2"/>
    </pattern>
  </defs>
  <!-- Sheen top-left -->
  <path d="M60 118 Q200 110 345 118 Q345 128 200 122 Q60 128 60 118 Z" fill="rgba(255,255,255,0.15)"/>
  <!-- Left-side depth -->
  <rect x="48" y="115" width="6" height="222" rx="3" fill="rgba(0,0,0,0.1)"/>
  <!-- Right-side depth -->
  <rect x="347" y="115" width="6" height="222" rx="3" fill="rgba(0,0,0,0.08)"/>
  <!-- Handle slot top -->
  <rect x="163" y="78" width="75" height="46" rx="10" fill="#B87840"/>
  <rect x="163" y="78" width="75" height="46" rx="10" fill="rgba(0,0,0,0.12)"/>
  <!-- Hang hole -->
  <circle cx="200" cy="96" r="12" fill="#C8874A"/>
  <circle cx="200" cy="96" r="9"  fill="#E8EDE0"/>
  <!-- Oil finish sheen -->
  <rect x="55" y="120" width="290" height="210" rx="10" fill="rgba(255,200,120,0.06)"/>
  <!-- Juice groove -->
  <rect x="68" y="134" width="265" height="188" rx="8" fill="none" stroke="rgba(160,90,20,0.3)" stroke-width="3"/>
</svg>

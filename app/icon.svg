<svg viewBox="0 0 32 32" xmlns="http://www.w3.org/2000/svg">
  <!-- Sprig mark, centred in 32×32 -->
  <g transform="translate(16 22)" stroke="#1C2E1C" stroke-width="1.8" stroke-linecap="round" fill="none">
    <!-- Right sprig: stalk + three tips (rosemary) -->
    <g transform="rotate(18)">
      <line x1="0" y1="0" x2="0" y2="-13"/>
      <line x1="-2" y1="-13" x2="-2" y2="-17"/>
      <line x1="0"  y1="-13" x2="0"  y2="-18"/>
      <line x1="2"  y1="-13" x2="2"  y2="-17"/>
    </g>
    <!-- Left sprig: stalk + oval leaf (basil) -->
    <g transform="rotate(-18)">
      <line x1="0" y1="0" x2="0" y2="-12"/>
      <ellipse cx="0" cy="-15.5" rx="3" ry="4.2"/>
    </g>
  </g>
</svg>
